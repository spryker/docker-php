name: "Combined CI/CD, Security Scan & Release Notes"

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  # Step 1: CI/CD
  ci-cd:
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    with:
      publish: true
      release_sha: ${{ github.event.pull_request.merge_commit_sha }}

  # Step 2: Security Scan
  security-scan:
    needs: ci-cd
    uses: ./.github/workflows/ecr-scheduled-security-scan.yml
    secrets: inherit
    with:
      trigger_source: 'workflow'

  # Step 3: Release Notes
  release-notes:
    needs: security-scan
    if: always() && github.event.pull_request.merged == true
    uses: ./.github/workflows/release-notes.yml
    secrets: inherit
    with:
      pr_body: ${{ github.event.pull_request.body }}